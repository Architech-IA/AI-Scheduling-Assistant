version: "3.8"

services:
  fastapi:
    build: .
    container_name: scheduling-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config/google_credentials.json:/app/config/google_credentials.json:ro
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: scheduling-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
